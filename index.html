<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant 360° Real Peek Speed Trainer</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0;
            background-color: #101823; /* โทนสีแดง-ดำ สไตล์ Valorant */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ece8e1;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh;
        }
        #ui-container {
            position: absolute; top: 20px;
            display: flex; gap: 20px;
            background: rgba(15, 25, 35, 0.9);
            padding: 15px 25px; border-radius: 4px; border-left: 4px solid #ff4655;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10;
        }
        .ui-box { display: flex; flex-direction: column; align-items: center; }
        .ui-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #768079; margin-bottom: 5px; }
        .ui-value { font-size: 20px; font-weight: bold; color: #ece8e1; }
        .ui-input {
            background: #202e3f; border: 1px solid #445365; color: #ece8e1;
            padding: 5px; width: 70px; text-align: center; font-size: 16px; font-weight: bold; border-radius: 2px;
        }
        .ui-input:focus { outline: none; border-color: #ff4655; }
        #game-canvas { background-color: #2b3945; cursor: none; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 2px solid #3f5165; }
        #instructions {
            position: absolute; bottom: 30px; text-align: center;
            background: rgba(0, 0, 0, 0.7); padding: 10px 20px; border-radius: 3px; pointer-events: none; font-size: 14px; letter-spacing: 1px;
        }
        .highlight { color: #ff4655; font-weight: bold; }
        .success { color: #00fca6; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="ui-box">
            <span class="ui-label">Valorant Sens</span>
            <input type="number" id="sens-input" class="ui-input" value="0.4" step="0.05" min="0.01">
        </div>
        <div class="ui-box">
            <span class="ui-label">Status</span>
            <span id="status-display" class="ui-value">WAITING</span>
        </div>
        <div class="ui-box">
            <span class="ui-label">Reaction Time</span>
            <span id="time-display" class="ui-value">-- ms</span>
        </div>
    </div>

    <canvas id="game-canvas" width="1024" height="576"></canvas>

    <div id="instructions">
        คลิกเพื่อ <span class="highlight">LOCK MOUSE</span> | หมุนเมาส์ได้ <span class="highlight">360 องศา</span><br>
        ความเร็วจำลอง <span class="highlight">Valorant Full Run Peek (5.4 m/s)</span> โผล่สุ่มซ้าย/ขวา!<br>
        กดยิงให้โดนหัวสีเหลือง! (คลิกหลังจากจบตาเพื่อเริ่มรอบใหม่)
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const sensInput = document.getElementById('sens-input');
        const statusDisplay = document.getElementById('status-display');
        const timeDisplay = document.getElementById('time-display');

        // --- ตั้งค่าระบบมุมกล้องและการควบคุม ---
        let valorantSens = parseFloat(sensInput.value);
        const rotationMultiplier = 4; 
        const worldWidth = 360 * rotationMultiplier; // ความกว้างของโลกจำลอง 360 องศา
        let cameraX = 0; 

        // สถานะเกม
        let isLocked = false;
        let gameState = 'waiting'; 
        let popTimeout = null;
        let spawnTime = 0;

        // โครงสร้างด่าน T-Junction (อิงตามรูปวาดของคุณ)
        const leftWallX = -180;  // ขอบกำแพงซ้ายใน World Space
        const rightWallX = 180; // ขอบกำแพงขวาใน World Space
        const openAreaY = 350;  // พื้นทางเดินด้านหลังที่บอทวิ่งผ่าน

        // คุณสมบัติของบอทศัตรู
        let enemy = {
            x: 0,
            y: openAreaY,
            width: 42,
            height: 125,
            headRadius: 12,
            speedX: 0,       
            direction: 1,    // 1 = ซ้ายไปขวา, -1 = ขวาไปซ้าย
            isMoving: false
        };

        // --- Event Listeners ควบคุมเมาส์ ---
        canvas.addEventListener('click', () => {
            if (!isLocked) {
                canvas.requestPointerLock();
            } else if (gameState === 'holding' || gameState === 'popped') {
                handleShot();
            } else if (gameState === 'shot' || gameState === 'missed' || gameState === 'waiting') {
                resetRound();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === canvas);
            if (!isLocked) {
                statusDisplay.innerText = "PAUSED";
                statusDisplay.style.color = "#ece8e1";
                stopRound();
            } else {
                resetRound();
            }
        });

        // ระบบคำนวณการหันเมาส์แบบ 360 องศาสมจริง
        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            const deltaX = e.movementX * (valorantSens * rotationMultiplier);
            cameraX += deltaX;
            // ใช้ Modulo ล็อคให้วนลูปเมื่อหันครบหนึ่งรอบแบบไร้รอยต่อ
            cameraX = (cameraX + worldWidth * 1.5) % worldWidth - worldWidth / 2;
        });

        sensInput.addEventListener('change', () => {
            valorantSens = parseFloat(sensInput.value) || 0.4;
        });

        // --- ฟังก์ชันระบบเกม ---
        function resetRound() {
            gameState = 'holding';
            statusDisplay.innerText = "HOLDING ANGLE";
            statusDisplay.style.color = "#ff4655";
            enemy.isMoving = false;

            if (popTimeout) clearTimeout(popTimeout);
            // สุ่มเวลาหน่วงก่อนบอทพุ่งออกมา (1.2 - 3 วินาที)
            popTimeout = setTimeout(spawnEnemy, 1200 + Math.random() * 1800);
        }

        function stopRound() {
            if (popTimeout) clearTimeout(popTimeout);
            enemy.isMoving = false;
        }

        function spawnEnemy() {
            if (gameState !== 'holding') return;
            gameState = 'popped';
            statusDisplay.innerText = "PEEK!";
            statusDisplay.style.color = "#00fca6";

            // สุ่มฝั่งเกิด 50/50 ตามรูปลูกศรแดงและดำของคุณ
            const spawnLeft = Math.random() > 0.5;
            
            // ความเร็วระดับจำลองการวิ่งสปีดสูงสุดในวาโรเรน (28-34 พิกเซลต่อเฟรม)
            const valorantRunSpeed = 28 + Math.random() * 6; 

            if (spawnLeft) {
                enemy.x = leftWallX - 50; // หลบหลังกำแพงซ้าย
                enemy.direction = 1;
                enemy.speedX = valorantRunSpeed;
            } else {
                enemy.x = rightWallX + 50; // หลบหลังกำแพงขวา
                enemy.direction = -1;
                enemy.speedX = -valorantRunSpeed;
            }

            enemy.isMoving = true;
            spawnTime = performance.now();
        }

        function handleShot() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // ตำแหน่งหัวของบอทใน World Space
            const headWorldX = enemy.x + enemy.width / 2;
            const headWorldY = enemy.y - enemy.height / 2 + enemy.headRadius;

            if (gameState === 'popped') {
                const reactionTime = Math.round(performance.now() - spawnTime);

                // ตรวจจับพิกัดชนเป้าเล็ง (Center จอ เทียบกับพิกัดบอทและมุมกล้อง)
                const dx = (centerX - headWorldX - cameraX);
                const dy = (centerY - headWorldY);
                const distToHead = Math.hypot(dx, dy);

                // ชดเชยความไวเฟรมเรตบนหน้าเว็บให้เล็กน้อย (+8 พิกเซล)
                if (distToHead <= enemy.headRadius + 8) { 
                    gameState = 'shot';
                    statusDisplay.innerText = "HEADSHOT!";
                    statusDisplay.style.color = "#00fca6";
                    timeDisplay.innerText = `${reactionTime} ms`;
                    timeDisplay.className = "ui-value success";
                } else {
                    gameState = 'missed';
                    statusDisplay.innerText = "MISSED";
                    statusDisplay.style.color = "#ff4655";
                }
                enemy.isMoving = false;
            } else if (gameState === 'holding') {
                // กดยิงเร็วไป (ยิงดักก่อนตัวโผล่)
                if (popTimeout) clearTimeout(popTimeout);
                gameState = 'missed';
                statusDisplay.innerText = "TOO EARLY!";
                statusDisplay.style.color = "#ff4655";
            }
        }

        // --- ส่วนการวาดภาพบน Canvas ---
        function update() {
            if (enemy.isMoving) {
                enemy.x += enemy.speedX;

                // ตรวจถ้าบอทวิ่งเลยขอบจอไปโดยยิงไม่ทัน
                if ((enemy.direction === 1 && enemy.x > rightWallX + 500) || 
                    (enemy.direction === -1 && enemy.x < leftWallX - 500)) {
                    gameState = 'missed';
                    statusDisplay.innerText = "TOO SLOW!";
                    statusDisplay.style.color = "#ff4655";
                    enemy.isMoving = false;
                }
            }

            // เคลียร์หน้าจอพื้นหลัง
            ctx.fillStyle = '#1e2833';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(cameraX, 0); // เลื่อนฉากตามเมาส์ที่หัน

            // วาดเส้นแนวพื้นทางเดินด้านหลัง
            ctx.strokeStyle = '#3f5165';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(-2000, openAreaY); ctx.lineTo(2000, openAreaY); ctx.stroke();

            // วาดตัวบอท (ต้องวาดก่อนกำแพง เพื่อให้กำแพงบังตอนแอบ)
            if (gameState === 'popped' || gameState === 'shot' || gameState === 'missed') {
                // ลำตัวสีแดงใสโปร่งแสง
                ctx.fillStyle = 'rgba(255, 70, 85, 0.85)';
                ctx.strokeStyle = '#ff4655';
                ctx.lineWidth = 2;
                ctx.fillRect(enemy.x, enemy.y - enemy.height/2, enemy.width, enemy.height/2);
                ctx.strokeRect(enemy.x, enemy.y - enemy.height/2, enemy.width, enemy.height/2);

                // หัวสีเหลือง (เป้าหมายหลัก)
                const headX = enemy.x + enemy.width / 2;
                const headY = enemy.y - enemy.height/2 + enemy.headRadius;
                ctx.fillStyle = '#fff000';
                ctx.beginPath(); ctx.arc(headX, headY, enemy.headRadius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#ffae00'; ctx.stroke();
            }

            // วาดบล็อกกำแพงหนาทึบจำลองทางสามแพร่ง (T-Junction)
            ctx.fillStyle = '#0f1923'; 
            ctx.fillRect(-2000, 0, 2000 + leftWallX, canvas.height); // บล็อกกำแพงฝั่งซ้าย
            ctx.fillRect(rightWallX, 0, 2000, canvas.height);        // บล็อกกำแพงฝั่งขวา

            // วาดเส้นสีแดงไฮไลท์ที่ขอบมุมตึกเพื่อช่วยฝึกเรื่อง Crosshair Placement
            ctx.strokeStyle = '#ff4655';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(leftWallX, 0); ctx.lineTo(leftWallX, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(rightWallX, 0); ctx.lineTo(rightWallX, canvas.height); ctx.stroke();

            ctx.restore();

            // วาดเป้าเล็งเล็งเขียวสไตล์ Valorant (Default 1-4-2-2) ล็อคกลางจอ
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const len = 6; const thick = 2; const gap = 3;

            ctx.fillStyle = '#00fca6';
            ctx.fillRect(cx - thick/2, cy - gap - len, thick, len); // เส้นบน
            ctx.fillRect(cx - thick/2, cy + gap, thick, len);       // เส้นล่าง
            ctx.fillRect(cx - gap - len, cy - thick/2, len, thick); // เส้นซ้าย
            ctx.fillRect(cx + gap, cy - thick/2, len, thick);       // เส้นขวา

            requestAnimationFrame(update);
        }

        // เริ่มต้นรันโปรแกรมเกม
        update();
    </script>
</body>
</html>
