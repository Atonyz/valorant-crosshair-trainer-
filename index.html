<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant 360° Angle & Placement Trainer</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #101823; /* Valorant Dark Blue/Black */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ece8e1; /* Valorant Off-White */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            background: rgba(15, 25, 35, 0.85); /* Valorant Menu UI Color */
            padding: 15px 25px;
            border-radius: 4px;
            border-left: 4px solid #ff4655; /* Valorant Red accent */
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .ui-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .ui-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #768079;
            margin-bottom: 5px;
        }
        .ui-value {
            font-size: 20px;
            font-weight: bold;
            color: #ece8e1;
        }
        .ui-input {
            background: #202e3f;
            border: 1px solid #445365;
            color: #ece8e1;
            padding: 5px;
            width: 70px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border-radius: 2px;
        }
        .ui-input:focus {
            outline: none;
            border-color: #ff4655;
        }
        #game-canvas {
            background-color: #2b3945; /* Simulated Shooting Range Wall */
            cursor: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #3f5165;
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 3px;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .highlight {
            color: #ff4655;
            font-weight: bold;
        }
        .success {
            color: #00fca6;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="ui-box">
            <span class="ui-label">Valorant Sens</span>
            <input type="number" id="sens-input" class="ui-input" value="0.4" step="0.05" min="0.01">
        </div>
        <div class="ui-box">
            <span class="ui-label">Status</span>
            <span id="status-display" class="ui-value">WAITING</span>
        </div>
        <div class="ui-box">
            <span class="ui-label">Reaction Time</span>
            <span id="time-display" class="ui-value">-- ms</span>
        </div>
    </div>

    <canvas id="game-canvas" width="1024" height="576"></canvas>

    <div id="instructions">
        คลิกที่จอเพื่อ <span class="highlight">LOCK MOUSE</span> | กด <span class="highlight">ESC</span> เพื่อปลดล็อค<br>
        <span class="highlight">หมุนเมาส์ได้ 360°</span> | วางเป้ารอศัตรู หรือฝึกวางเป้าตามมุมกําแพง (<span class="highlight">Crosshair Placement</span>)!<br>
        กดยิง (<span class="highlight">คลิกซ้าย</span>) ให้โดนหัวสีเหลือง!
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const sensInput = document.getElementById('sens-input');
        const statusDisplay = document.getElementById('status-display');
        const timeDisplay = document.getElementById('time-display');

        // --- Game Configuration ---

        // Valorant Default Mouse Settings (Example)
        let valorantSens = parseFloat(sensInput.value);
        const mouseDPI = 800; // Assuming 800 DPI for example calibration
        
        // Pseudo-3D Camera Rotation (using pixels as angles for simplicity)
        // 1 pixel of movement = [sens * baseSensitivity] units of rotation
        // A full 360 degree rotation is represented by a specific range of X values.
        let cameraX = 0; 
        const rotationMultiplier = 4; // Arbitrary base sensitivity for web feel
        const worldWidth = 360 * rotationMultiplier; // Total X units needed for 360 rotation

        // Game State
        let isLocked = false;
        let gameState = 'waiting'; // waiting, holding, popped, shot, missed
        let popTimeout = null;
        let spawnTime = 0;

        // Level Environment Definition (Absolute positions in "world space")
        // We will define two "corners" for placement training
        const walls = [
            { id: 1, cornerX: 300, width: 200 }, // A main angle to hold
            { id: 2, cornerX: - worldWidth / 2 + 300, width: 100 }, // Another angle if you turn far
            { id: 3, cornerX: worldWidth / 2 + 100, width: 150 }, // Angle "behind" the spawn
        ];

        // Enemy Properties
        let enemy = {
            x: -1000, // Starts off-world
            y: 350,
            width: 50,
            height: 140,
            headRadius: 14,
            speed: 8,
            isMoving: false,
            currentWall: 1 // Which wall it pops from
        };

        // --- Event Listeners ---

        canvas.addEventListener('click', () => {
            if (!isLocked) {
                canvas.requestPointerLock();
            } else if (gameState === 'holding' || gameState === 'popped') {
                handleShot();
            } else if (gameState === 'shot' || gameState === 'missed' || gameState === 'waiting') {
                resetRound();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isLocked = (document.pointerLockElement === canvas);
            if (!isLocked) {
                statusDisplay.innerText = "PAUSED";
                statusDisplay.style.color = "#ece8e1";
                stopRound();
            } else {
                resetRound();
            }
        });

        // 360° MOUSE MOVEMENT LOGIC
        document.addEventListener('mousemove', (e) => {
            if (!isLocked) return;
            
            // 1. Calculate movement delta
            const deltaX = e.movementX * (valorantSens * rotationMultiplier);
            
            // 2. Add movement to camera position (with 360 wrapping)
            cameraX += deltaX;

            // 3. Keep cameraX within -worldWidth/2 to worldWidth/2 to simulate 360 wrapping
            // Use modulo for seamless wrapping
            cameraX = (cameraX + worldWidth * 1.5) % worldWidth - worldWidth / 2;
        });

        sensInput.addEventListener('change', () => {
            valorantSens = parseFloat(sensInput.value) || 0.4;
        });

        // --- Game Logic Functions ---

        function resetRound() {
            gameState = 'holding';
            statusDisplay.innerText = "HOLDING ANGLE";
            statusDisplay.style.color = "#ff4655";
            
            // Reset Enemy and pick a random wall to peek from (if needed, otherwise fixed)
            enemy.currentWall = 1;
            const chosenWall = walls[0];
            enemy.x = chosenWall.cornerX - 100; // Reset position
            enemy.isMoving = false;

            // Random delay between 1.5 to 3.5 seconds before enemy peeks
            if (popTimeout) clearTimeout(popTimeout);
            popTimeout = setTimeout(spawnEnemy, 1500 + Math.random() * 2000);
        }

        function stopRound() {
            if (popTimeout) clearTimeout(popTimeout);
            enemy.isMoving = false;
        }

        function spawnEnemy() {
            if (gameState !== 'holding') return;
            gameState = 'popped';
            statusDisplay.innerText = "PEEK!";
            statusDisplay.style.color = "#00fca6";
            enemy.isMoving = true;
            spawnTime = performance.now();
        }

        function handleShot() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Target boundaries (Headshot calibration)
            const headWorldX = enemy.x + enemy.width / 2;
            const headWorldY = enemy.y - enemy.height/2 + enemy.headRadius;

            if (gameState === 'popped') {
                const reactionTime = Math.round(performance.now() - spawnTime);

                // Check distance using World coordinates and Camera offset
                const dx = (centerX - headWorldX - cameraX);
                const dy = (centerY - headWorldY);
                const distToHead = Math.hypot(dx, dy);

                // Account for potential 360 wrapping if necessary, but keep it simple for core angle
                if (distToHead <= enemy.headRadius + 5) {
                    gameState = 'shot';
                    statusDisplay.innerText = "HEADSHOT!";
                    statusDisplay.style.color = "#00fca6";
                    timeDisplay.innerText = `${reactionTime} ms`;
                    timeDisplay.className = "ui-value success";
                } else {
                    gameState = 'missed';
                    statusDisplay.innerText = "MISSED";
                    statusDisplay.style.color = "#ff4655";
                }
                enemy.isMoving = false;
            } else if (gameState === 'holding') {
                // Prefire too early
                if (popTimeout) clearTimeout(popTimeout);
                gameState = 'missed';
                statusDisplay.innerText = "TOO EARLY!";
                statusDisplay.style.color = "#ff4655";
            }
        }

        // --- Main Game Loop (Rendering) ---

        function drawWall(wall, xOffset, canvasHeight) {
             // Wall (Obstacle hiding the enemy)
            ctx.fillStyle = '#0f1923'; // Darker Valorant container box color
            ctx.fillRect(-canvas.width/2 + wall.cornerX + xOffset, 0, wall.width, canvasHeight);
            
            // Wall Edge Highlight Line (for Placement reference)
            ctx.strokeStyle = '#ff4655'; // Valorant Red accent
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(wall.cornerX + xOffset, 0);
            ctx.lineTo(wall.cornerX + xOffset, canvasHeight);
            ctx.stroke();
        }

        function update() {
            // Move Enemy
            if (enemy.isMoving) {
                enemy.x += enemy.speed;
                // Simple run-out-of-view check (needs 360 thought for full level)
                if (enemy.x > 1000 + wallX) {
                    gameState = 'missed';
                    statusDisplay.innerText = "TOO SLOW!";
                    statusDisplay.style.color = "#ff4655";
                    enemy.isMoving = false;
                }
            }

            // Clear Screen
            ctx.fillStyle = '#1e2833'; // Deep background color
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Level Components
            ctx.save();
            ctx.translate(cameraX, 0); // Apply 360 camera rotation offset

            // 1. Draw Floor Line (infinite-ish for 360)
            ctx.strokeStyle = '#3f5165';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-10000, 350);
            ctx.lineTo(10000, 350);
            ctx.stroke();

            // 2. Draw Level Environment (Walls/Corners)
            // Need to handle infinite tiling if they turn past the world width
            for(let wall of walls) {
                // Draw current world's wall
                drawWall(wall, 0, canvas.height);
                
                // Draw tiled walls to handle 360 visual continuity
                drawWall(wall, -worldWidth, canvas.height);
                drawWall(wall, worldWidth, canvas.height);
            }

            // 3. Draw Enemy Bot (if active or just finished)
            // Similar tiling approach if enemy can be anywhere
            if (gameState === 'popped' || gameState === 'shot' || gameState === 'missed') {
                // Body
                ctx.fillStyle = 'rgba(255, 70, 85, 0.7
